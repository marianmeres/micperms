<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>micperms — mic re-enable guide</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: system-ui, -apple-system, sans-serif;
				background: #f2f2f7;
				color: #1c1c1e;
				min-height: 100dvh;
				padding: 24px;
				display: grid;
				grid-template-columns: 1fr;
				gap: 20px;
				place-items: start center;
			}
			html.dark body {
				background: #000;
				color: #f2f2f7;
			}
			.controls {
				width: 420px;
				max-width: 100%;
				background: #fff;
				border-radius: 12px;
				padding: 14px;
				box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
				display: grid;
				gap: 10px;
			}
			.flavor-grid {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 6px;
			}
			.flavor-grid button {
				justify-self: stretch;
				padding: 8px 10px;
				border: 1px solid #d0d0d5;
				border-radius: 8px;
				background: #fff;
				color: #1c1c1e;
				font: inherit;
				font-size: 12.5px;
				font-weight: 500;
				cursor: pointer;
				text-align: left;
			}
			.flavor-grid button:hover {
				background: #f2f2f7;
			}
			.flavor-grid button.is-active {
				background: #007aff;
				border-color: #007aff;
				color: #fff;
			}
			html.dark .flavor-grid button {
				background: #1c1c1e;
				border-color: #38383a;
				color: #f2f2f7;
			}
			html.dark .flavor-grid button:hover {
				background: #2c2c2e;
			}
			html.dark .flavor-grid button.is-active {
				background: #007aff;
				border-color: #007aff;
				color: #fff;
			}
			html.dark .controls {
				background: #1c1c1e;
				box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
			}
			.controls h1 {
				font-size: 14px;
				font-weight: 600;
				margin: 0 0 4px;
			}
			.controls label {
				font-size: 13px;
				display: grid;
				grid-template-columns: 110px 1fr;
				align-items: center;
				gap: 8px;
			}
			.controls select,
			.controls input[type="text"] {
				width: 100%;
				padding: 6px 8px;
				border: 1px solid #ccc;
				border-radius: 6px;
				font: inherit;
				background: inherit;
				color: inherit;
			}
			html.dark .controls select,
			html.dark .controls input[type="text"] {
				border-color: #444;
			}
			.controls button {
				justify-self: start;
				padding: 6px 14px;
				border: 0;
				border-radius: 6px;
				background: #007aff;
				color: #fff;
				font: inherit;
				font-weight: 600;
				cursor: pointer;
			}
			.log {
				font-family: ui-monospace, Menlo, monospace;
				font-size: 12px;
				max-height: 90px;
				overflow: auto;
				padding: 6px 8px;
				background: #f7f7fa;
				border-radius: 6px;
				color: #555;
			}
			html.dark .log {
				background: #2c2c2e;
				color: #aaa;
			}
		</style>
	</head>
	<body>
		<div class="controls">
			<h1>Mic re-enable guide — playground</h1>

			<div>
				<div style="font-size: 13px; margin-bottom: 6px">Flavor</div>
				<div class="flavor-grid" id="flavor-grid">
					<button type="button" data-flavor="">auto-detect</button>
					<button type="button" data-flavor="ios-safari">ios-safari</button>
					<button type="button" data-flavor="android-chrome">
						android-chrome
					</button>
					<button type="button" data-flavor="desktop">desktop</button>
					<button type="button" data-flavor="ios-webview">ios-webview</button>
					<button type="button" data-flavor="android-webview">
						android-webview
					</button>
					<button type="button" data-flavor="ios-pwa">ios-pwa</button>
					<button type="button" data-flavor="android-pwa">android-pwa</button>
				</div>
			</div>

			<label>
				Language
				<select id="lang">
					<option value="auto">auto (navigator.language)</option>
					<option value="en">en</option>
					<option value="sk">sk</option>
				</select>
			</label>

			<label>
				Theme
				<select id="theme">
					<option value="auto">auto (follows html.dark)</option>
					<option value="light">light</option>
					<option value="dark">dark</option>
				</select>
			</label>

			<label>
				Accent
				<input id="accent" type="text" placeholder="e.g. #ff3b30" />
			</label>

			<label>
				With CTA
				<select id="cta">
					<option value="yes">yes (logs callback)</option>
					<option value="no">no</option>
				</select>
			</label>

			<button id="toggle-dark" type="button">Toggle html.dark</button>
			<button id="rebuild" type="button">Apply / Rebuild</button>
			<div class="log" id="log">ready</div>
		</div>

		<div id="mount"></div>

		<script type="module">
			import { createMicReenableGuide, detectFlavor } from "./dist/guide.js";

			const mount = document.getElementById("mount");
			const logEl = document.getElementById("log");
			const $flavorGrid = document.getElementById("flavor-grid");
			const $lang = document.getElementById("lang");
			const $theme = document.getElementById("theme");
			const $accent = document.getElementById("accent");
			const $cta = document.getElementById("cta");

			function log(msg) {
				const t = new Date().toLocaleTimeString();
				logEl.textContent = `[${t}] ${msg}\n` + logEl.textContent;
			}

			let guide = null;
			let currentFlavor = "";

			function setActiveButton() {
				for (const btn of $flavorGrid.querySelectorAll("button")) {
					btn.classList.toggle(
						"is-active",
						btn.dataset.flavor === currentFlavor,
					);
				}
			}

			function build() {
				if (guide) guide.destroy();
				const flavor = currentFlavor || undefined;
				const lang = $lang.value;
				const theme = $theme.value;
				const accent = $accent.value.trim() || undefined;
				const wantCta = $cta.value === "yes";

				guide = createMicReenableGuide({
					container: mount,
					flavor,
					lang,
					theme,
					accent,
					onOpenSettings: wantCta
						? () => log("onOpenSettings fired")
						: undefined,
					onDone: () => log("onDone fired"),
				});
				setActiveButton();
				log(
					`built — flavor=${
						flavor ?? "(auto: " + detectFlavor() + ")"
					}, lang=${lang} (resolved: ${guide.el.lang}), theme=${theme}`,
				);
			}

			$flavorGrid.addEventListener("click", (e) => {
				const btn = e.target.closest("button[data-flavor]");
				if (!btn) return;
				currentFlavor = btn.dataset.flavor;
				build();
			});

			document.getElementById("toggle-dark").addEventListener("click", () => {
				document.documentElement.classList.toggle("dark");
				log("html.dark = " + document.documentElement.classList.contains("dark"));
			});

			document.getElementById("rebuild").addEventListener("click", build);
			[$lang, $theme, $accent, $cta].forEach((el) =>
				el.addEventListener("change", build)
			);

			build();
		</script>
	</body>
</html>
